#
# Repo-wide rustc pin. Verus uses its own rustc fork via the `verus`
# CLI; that override is local to `proofs/verus/` and does not conflict
# with this stable pin used for everything else (kernel, ipc, alloc,
# capsules).

[toolchain]
channel = "stable"
components = ["rustfmt", "clippy", "rust-src"]
profile = "minimal"
