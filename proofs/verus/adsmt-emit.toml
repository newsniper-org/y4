# Versions follow adsmt-contrib testing branch (R7.6 channel pin, R7.10
# inbound contract).  Source = ~/adsmt-contrib/ (사용자 환경 측 clone,
# rc.33 base rebuild 필요 — `cargo build --release --target wasm32-
# wasip1 -p adsmt-emit-isabelle-wasm -p adsmt-emit-rocq-wasm`).
#
# Cross-ref:
# - ~/.claude/plans/jazzy-gliding-puppy.md (R7.11 end-to-end pipeline)
# - <Y4>/.claude-notes/trackers/y4-sel4-integration-tracker.md
# - .local-replies-from/adsmt/2026-06-08-emit-cert-resolved-plus-wasm-emitter-redesign.md
# - .local-replies-from/verus-fork/2026-06-09-R7.11-unblocked-full-emit-pipeline-end-to-end.md

