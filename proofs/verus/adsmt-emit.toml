# Declares which emitter packages this Y4 verus subtree consumes —
# `adsmt-emit install` (one-time per project root) builds the wasm
# artifacts + content-addresses into `.adsmt-emitters/` + writes
# `adsmt-emit.lock` (commit lockfile).
