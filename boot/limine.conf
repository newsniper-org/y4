#
# Limine 12.x boot configuration.
# Format reference: third_party/limine/CONFIG.md (or limine-config(5)).

timeout: 0
default_entry: 1

# seL4 x86_64 is a Multiboot1 image (header magic 0x1BADB002 in
# third_party/sel4/src/arch/x86/multiboot.S).  Use Limine's multiboot1
# protocol — NOT the native Limine protocol.
#
# `module_path` declares the root task ELF that seL4 picks up as the
# first multiboot module (boot_state.boot_module_start in seL4's
# boot_sys.c).  Phase B step 5 ships y4-roottask.elf — printing
# "Hello, Y4" and halting.

/Y4 (x86_64 debug)
    protocol: multiboot1
    kernel_path: boot():/boot/kernel.elf
    cmdline: y4.console=serial,38400 y4.phase=B
    module_path: boot():/boot/y4-roottask.elf
    module_string: y4.roottask=v0
